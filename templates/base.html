<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}NRCan Article Monitor{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark navbar-expand-lg" id="main-nav">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="{{ url_for('index') }}">
      <i class="bi bi-newspaper"></i>
      NRCan Article Monitor
    </a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <a href="{{ url_for('settings_page') }}" class="nav-link text-white">
        <i class="bi bi-gear-fill me-1"></i>Settings
      </a>
    </div>
  </div>
</nav>

<!-- Progress banner (shown during scrape) -->
<div id="progress-banner" class="d-none">
  <div class="progress-banner-inner">
    <span class="spinner-border spinner-border-sm me-2" role="status"></span>
    <span id="progress-text">Starting scrape…</span>
    <div class="progress mt-2" style="height:6px;">
      <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated"
           role="progressbar" style="width:0%"></div>
    </div>
  </div>
</div>

<!-- Flash messages -->
<div class="container-fluid px-4 pt-3">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
  <div id="alert-container"></div>
</div>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
